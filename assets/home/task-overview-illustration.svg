<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="100%" height="100%">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#D9D0C5" flood-opacity="0.35"/>
    </filter>

    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F1E7" stop-opacity="0" />
      <stop offset="40%" stop-color="#F7F1E7" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#F7F1E7" stop-opacity="1" />
    </linearGradient>

    <clipPath id="cardClip">
      <rect x="0" y="0" width="1000" height="500" rx="40" />
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1000" height="500" rx="40" fill="#F7F1E7"/>

  <g clip-path="url(#cardClip)">
    <g fill="#D0C4B8" transform="translate(100, 160)">
      <path d="M 15 0 A 10 10 0 1 1 15 20 C 15 35 5 45 -5 50 L -10 40 C 0 35 5 25 5 15 A 10 10 0 0 1 5 0 Z" />
      <path d="M 40 0 A 10 10 0 1 1 40 20 C 40 35 30 45 20 50 L 15 40 C 25 35 30 25 30 15 A 10 10 0 0 1 30 0 Z" />
    </g>

    <path d="M 400 450 C 460 450 490 290 530 290 C 570 290 620 450 680 450 Z" fill="#EEDDCC" opacity="0.85"/>
    <path d="M 480 450 C 530 450 590 280 630 280 C 670 280 730 450 780 450 Z" fill="#E8D2BB" opacity="0.85"/>
    <path d="M 600 450 C 680 450 780 160 850 160 C 900 160 950 450 1000 450 Z" fill="#D3D9CA" opacity="0.9"/>
    <path d="M 680 450 C 740 450 800 210 850 210 C 890 210 930 450 970 450 Z" fill="#C6CEBF" opacity="0.6"/>
    <path d="M 620 450 C 680 450 720 270 760 270 C 800 270 830 450 880 450 Z" fill="#B8B4A6" opacity="0.85"/>

    <g transform="translate(760, 270)">
      <path d="M 0 0 Q 5 -15 10 -35" fill="none" stroke="#9DB387" stroke-width="3" stroke-linecap="round"/>
      <path d="M 10 -35 Q 0 -50 10 -55 Q 20 -50 10 -35 Z" fill="#A9C490"/>
      <path d="M 8 -25 Q 20 -35 30 -25 Q 20 -15 8 -25 Z" fill="#A9C490"/>
      <path d="M 6 -20 Q -5 -30 -15 -20 Q -5 -10 6 -20 Z" fill="#C5DCAE"/>
    </g>

    <path d="M 520 450 C 600 450 720 320 780 320 C 850 320 920 450 1000 450 Z" fill="#A8B1A0" opacity="0.8"/>
    <path d="M 580 450 C 680 450 800 350 860 350 C 920 350 960 450 1000 450 Z" fill="#E1D0BC" opacity="0.9"/>
    <path d="M 450 450 C 600 450 750 380 900 380 C 960 380 980 450 1000 450 Z" fill="#F0E1D0" opacity="0.95"/>

    <rect x="50" y="320" width="900" height="130" fill="url(#bottomFade)" pointer-events="none" />
  </g>
</svg>
