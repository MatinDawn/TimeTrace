<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="120" height="150">
  <defs>
    <radialGradient id="leafCloud" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8b78a" stop-opacity="0.88"/>
      <stop offset="60%" stop-color="#7d9167" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#5a6e3f" stop-opacity="0.48"/>
    </radialGradient>
    <radialGradient id="leafCloudSoft" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#bcc99d" stop-opacity="0.78"/>
      <stop offset="70%" stop-color="#8aa074" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#5a6e3f" stop-opacity="0.22"/>
    </radialGradient>
    <radialGradient id="sproutGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#c2e0a4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7d9167" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 土坡 -->
  <ellipse cx="60" cy="144" rx="38" ry="3.5" fill="#8b7355" opacity="0.3"/>
  <ellipse cx="60" cy="143" rx="22" ry="2" fill="#3a3a3a" opacity="0.24"/>

  <!-- 第一阶段：嫩芽主干（下部分） -->
  <path d="M 60 142 C 58.5 130 61.5 120 60 110"
        stroke="#3a3a3a" stroke-width="2.2" fill="none"
        stroke-linecap="round" opacity="0.95"/>

  <!-- 第二阶段：中间主干 + 一对小叶子 -->
  <path d="M 60 110 C 57 100 63 90 60 80"
        stroke="#3a3a3a" stroke-width="2" fill="none"
        stroke-linecap="round" opacity="0.92"/>
  <ellipse cx="52" cy="94" rx="6" ry="4.5" fill="url(#leafCloudSoft)"/>
  <ellipse cx="68" cy="92" rx="5.5" ry="4" fill="url(#leafCloudSoft)"/>
  <ellipse cx="52.5" cy="93.5" rx="4" ry="3" fill="#5a6e3f" opacity="0.5"/>
  <ellipse cx="67.5" cy="91.5" rx="3.8" ry="2.8" fill="#5a6e3f" opacity="0.45"/>

  <!-- 第三阶段：完整树 -->
  <path d="M 60 80 C 57.5 72 62.5 64 60 56"
        stroke="#3a3a3a" stroke-width="1.8" fill="none"
        stroke-linecap="round" opacity="0.88"/>
  <path d="M 60 92 Q 51 88 44 80 Q 40 76 38 70"
        stroke="#3a3a3a" stroke-width="1.6" fill="none"
        stroke-linecap="round" opacity="0.82"/>
  <path d="M 60 78 Q 69 74 76 66 Q 80 62 82 56"
        stroke="#3a3a3a" stroke-width="1.6" fill="none"
        stroke-linecap="round" opacity="0.82"/>
  <path d="M 60 60 Q 55 54 57 46"
        stroke="#3a3a3a" stroke-width="1.4" fill="none"
        stroke-linecap="round" opacity="0.78"/>
  <path d="M 60 50 Q 65 44 69 38"
        stroke="#3a3a3a" stroke-width="1.3" fill="none"
        stroke-linecap="round" opacity="0.78"/>

  <!-- 叶子团 -->
  <ellipse cx="40" cy="68" rx="13" ry="8.5" fill="url(#leafCloudSoft)"/>
  <ellipse cx="41" cy="66" rx="8.5" ry="5.5" fill="#5a6e3f" opacity="0.55"/>
  <ellipse cx="82" cy="54" rx="15" ry="10.5" fill="url(#leafCloud)"/>
  <ellipse cx="80" cy="52" rx="9.5" ry="6.5" fill="#5a6e3f" opacity="0.6"/>
  <ellipse cx="58" cy="36" rx="23" ry="14" fill="url(#leafCloud)"/>
  <ellipse cx="56" cy="34" rx="15" ry="9.5" fill="#5a6e3f" opacity="0.62"/>
  <ellipse cx="64" cy="38" rx="9.5" ry="6.5" fill="#7d9167" opacity="0.7"/>
  <ellipse cx="60" cy="22" rx="8.5" ry="5.5" fill="url(#leafCloudSoft)"/>
  <ellipse cx="60" cy="22" rx="5" ry="3.5" fill="#5a6e3f" opacity="0.55"/>

  <!-- 梅花 -->
  <circle cx="50" cy="32" r="1.55" fill="#c04848" opacity="0.85"/>
  <circle cx="67.5" cy="39.5" r="1.45" fill="#c04848" opacity="0.8"/>
  <circle cx="58" cy="25.5" r="1.35" fill="#c04848" opacity="0.78"/>
</svg>
