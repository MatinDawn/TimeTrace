  <circle cx="34" cy="143" r="1.2" fill="#4a3a28" opacity="0.4"/>
  <circle cx="46" cy="141" r="1" fill="#4a3a28" opacity="0.35"/>
  <circle cx="58" cy="144" r="0.9" fill="#4a3a28" opacity="0.32"/>
  <circle cx="70" cy="142" r="1.1" fill="#4a3a28" opacity="0.38"/>
  <circle cx="82" cy="143" r="1" fill="#4a3a28" opacity="0.34"/>
  <circle cx="94" cy="142" r="1.2" fill="#4a3a28" opacity="0.36"/>

  <!-- 主干 -->
  <path d="M 60 140 C 56 126 64 116 60 102 C 57 94 63 86 60 76 C 57 68 63 60 60 50"
