<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="120" height="150">
  <defs>
    <radialGradient id="leafCloud" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a8b78a" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#7d9167" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#5a6e3f" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="leafCloudSoft" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#bcc99d" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#8aa074" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5a6e3f" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="soilBase" cx="50%" cy="60%" r="70%">
      <stop offset="0%" stop-color="#7a6348" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#8b7355" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#a68c6c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 不规则手绘土壤 -->
  <path d="M 22 145 Q 28 140 34 144 Q 40 147 48 142 Q 56 138 60 143 Q 66 148 74 143 Q 82 139 88 144 Q 94 149 100 144 Q 106 139 112 145 L 112 150 L 22 150 Z"
        fill="url(#soilBase)" opacity="0.7"/>
  <path d="M 28 143 Q 33 139 40 142 Q 46 145 54 140 Q 60 136 64 141 Q 70 146 78 141 Q 84 137 90 142 Q 96 147 102 142 L 102 148 L 28 148 Z"
        fill="#5a4a38" opacity="0.25"/>
  <path d="M 32 142 Q 36 138 42 141 Q 48 144 56 139 Q 62 135 66 140 Q 72 145 80 140 Q 86 136 92 141 Q 98 146 104 141 L 104 147 L 32 147 Z"
